<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ポケカ買取メモ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --border: #d1d1d6;
    --text: #1c1c1e;
    --text2: #6c6c70;
    --text3: #aeaeb2;
    --accent: #0071e3;
    --accent2: #34aadc;
    --green: #34c759;
    --red: #ff3b30;
    --orange: #ff9500;
    --yellow: #ffcc00;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --radius: 13px;
    --radius-sm: 8px;
    --tab-h: 44px;
    --nav-h: 56px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --surface2: #3a3a3c;
      --border: #3a3a3c;
      --text: #ffffff;
      --text2: #aeaeb2;
      --text3: #636366;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 15px; }
  body { display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  /* ── ヘッダー ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top) 0 0;
  }
  @media (prefers-color-scheme: dark) {
    .header { background: rgba(28,28,30,.85); }
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: var(--nav-h); padding: 0 16px;
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--accent); touch-action: manipulation;
  }

  /* ── タブ ── */
  .tab-bar {
    display: flex; height: var(--tab-h); padding: 6px;
    background: var(--surface2); margin: 0 16px 0;
    border-radius: 11px; gap: 4px;
  }
  .tab-btn {
    flex: 1; border: none; background: transparent; border-radius: 8px;
    font-size: 14px; font-weight: 600; color: var(--text2);
    cursor: pointer; touch-action: manipulation; transition: all .2s;
  }
  .tab-btn.active {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow);
  }

  /* ── コンテンツ ── */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px 100px; }

  /* ── セクションヘッダー ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 4px; margin-top: 8px;
  }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .add-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 14px; font-weight: 600; color: var(--accent);
    background: none; border: none; cursor: pointer; touch-action: manipulation;
  }

  /* ── カードリスト ── */
  .card-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .card-row {
    display: flex; align-items: center; background: var(--surface);
    padding: 12px 14px; gap: 10px; cursor: pointer; touch-action: manipulation;
    transition: background .15s;
  }
  .card-row:active { background: var(--surface2); }
  .card-row-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
  .card-row-body { flex: 1; min-width: 0; }
  .card-row-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-row-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-row-right { text-align: right; flex-shrink: 0; }
  .price-main { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .price-diff { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .diff-up { color: var(--green); }
  .diff-down { color: var(--red); }
  .diff-flat { color: var(--text3); }
  .chevron { color: var(--text3); font-size: 13px; margin-left: 4px; }

  /* ── 空状態 ── */
  .empty { text-align: center; padding: 48px 16px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; font-weight: 500; }
  .empty-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* ── モーダル共通 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom);
    width: 100%; max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close { font-size: 22px; color: var(--text2); background: none; border: none; cursor: pointer; touch-action: manipulation; padding: 0 4px; }
  .modal-body { padding: 16px 20px; }

  /* ── フォーム ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 16px; outline: none; appearance: none; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 14px; border-radius: var(--radius);
    background: var(--accent); color: #fff; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation;
  }
  .btn-danger {
    width: 100%; padding: 14px; border-radius: var(--radius);
    background: var(--red); color: #fff; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation;
    margin-top: 8px;
  }
  .btn-secondary {
    width: 100%; padding: 14px; border-radius: var(--radius);
    background: var(--surface2); color: var(--text); border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; touch-action: manipulation;
    margin-top: 8px;
  }

  /* ── 詳細モーダル ── */
  .detail-modal .modal { max-height: 96vh; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .chart-wrap { background: var(--surface2); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; height: 200px; position: relative; }
  .history-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
  .history-row { background: var(--surface); padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; }
  .history-date { font-size: 14px; color: var(--text2); }
  .history-price { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .history-del { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; touch-action: manipulation; padding: 0 0 0 12px; }

  /* ── 価格入力モーダル ── */
  .price-input-grid { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; max-height: 55vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .price-input-row { background: var(--surface); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .price-input-name { flex: 1; font-size: 14px; font-weight: 600; }
  .price-input-field {
    width: 110px; padding: 8px 10px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 15px; text-align: right; outline: none; -webkit-appearance: none;
  }
  .price-input-field:focus { border-color: var(--accent); }

  /* ── 管理モーダル ── */
  .manage-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
  .manage-row { background: var(--surface); padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
  .manage-handle { font-size: 20px; color: var(--text3); cursor: grab; touch-action: none; padding: 0 4px; user-select: none; -webkit-user-select: none; }
  .manage-name { flex: 1; font-size: 15px; font-weight: 600; }
  .manage-del { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; touch-action: manipulation; padding: 0 2px; }
  .sortable-ghost { opacity: .35; background: var(--accent) !important; border-radius: var(--radius-sm); }
  .sortable-chosen { background: var(--surface2) !important; box-shadow: 0 4px 16px rgba(0,0,0,.15); }


  /* ── フローティングボタン ── */
  .fab-area {
    position: fixed; bottom: calc(env(safe-area-inset-bottom) + 16px); right: 16px;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end; z-index: 90;
  }
  .fab {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none;
    font-size: 24px; cursor: pointer; touch-action: manipulation;
    box-shadow: 0 4px 16px rgba(0,113,227,.4);
    display: flex; align-items: center; justify-content: center;
  }
  .fab-label { background: var(--surface); border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow); }

  /* ─── トースト ─── */
  .toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px); left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(50,50,52,.95); color: #fff; border-radius: 20px;
    padding: 10px 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity .25s, transform .25s; z-index: 999; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>🃏 ポケカ買取メモ</h1>
    <div class="header-actions">
      <button class="icon-btn" id="btnAddPrice" title="価格入力" style="touch-action:manipulation">＋</button>
      <button class="icon-btn" id="btnManage" title="管理" style="touch-action:manipulation">⚙︎</button>
    </div>
  </div>
  <div style="padding:0 16px 10px">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="box" style="touch-action:manipulation">📦 BOX</button>
      <button class="tab-btn" data-tab="pack" style="touch-action:manipulation">🎴 パック</button>
    </div>
  </div>
</div>

<div class="content" id="mainContent"></div>

<div class="fab-area">
  <button class="fab" id="fabAddItem" title="追加">＋</button>
</div>

<div class="toast" id="toast"></div>

<!-- ── 価格入力モーダル ── -->
<div class="modal-overlay" id="modalPrice">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">価格入力</span>
      <button class="modal-close" data-close="modalPrice" style="touch-action:manipulation">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="priceDate">
      </div>
      <div id="priceInputRows" class="price-input-grid"></div>
      <div style="margin-top:16px">
        <button class="btn-primary" id="btnSavePrices" style="touch-action:manipulation">保存する</button>
      </div>
    </div>
  </div>
</div>

<!-- ── アイテム追加モーダル ── -->
<div class="modal-overlay" id="modalAddItem">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="addItemTitle">BOXを追加</span>
      <button class="modal-close" data-close="modalAddItem" style="touch-action:manipulation">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">名前</label>
        <input class="form-input" type="text" id="addItemName" placeholder="例：拡張パック スカーレット">
      </div>
      <div class="form-group">
        <label class="form-label">発売日（任意）</label>
        <input class="form-input" type="date" id="addItemReleaseDate">
      </div>
      <button class="btn-primary" id="btnSaveItem" style="touch-action:manipulation">追加する</button>
    </div>
  </div>
</div>

<!-- ── 詳細モーダル ── -->
<div class="modal-overlay detail-modal" id="modalDetail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="detailTitle"></span>
      <button class="modal-close" data-close="modalDetail" style="touch-action:manipulation">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- ── 編集モーダル ── -->
<div class="modal-overlay" id="modalEdit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">編集</span>
      <button class="modal-close" data-close="modalEdit" style="touch-action:manipulation">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">名前</label>
        <input class="form-input" type="text" id="editItemName" placeholder="名前">
      </div>
      <div class="form-group">
        <label class="form-label">発売日（任意）</label>
        <input class="form-input" type="date" id="editItemReleaseDate">
      </div>
      <input type="hidden" id="editItemId">
      <button class="btn-primary" id="btnSaveEdit" style="touch-action:manipulation">保存する</button>
    </div>
  </div>
</div>

<!-- ── 管理モーダル ── -->
<div class="modal-overlay" id="modalManage">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="manageTitle">BOX 管理</span>
      <button class="modal-close" data-close="modalManage" style="touch-action:manipulation">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-header" style="padding-top:0">
        <span class="section-title">並び替え・削除</span>
      </div>
      <div id="manageList" class="manage-list"></div>

      <!-- バックアップ -->
      <div class="section-header" style="margin-top:20px">
        <span class="section-title">バックアップ</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button onclick="exportData()" style="width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;touch-action:manipulation;">📤 エクスポート（JSONダウンロード）</button>
        <button onclick="document.getElementById('importFile').click()" style="width:100%;padding:13px;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-weight:600;touch-action:manipulation;">📥 インポート（JSONを読み込む）</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <p style="font-size:12px;color:var(--text2);text-align:center;margin:0;">インポートすると現在のデータに上書きされます</p>
      </div>
      <div id="deleteConfirmArea" style="display:none;margin-top:14px;background:var(--surface2);border-radius:var(--radius);padding:14px;">
        <div id="deleteConfirmName" style="font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)"></div>
        <div style="display:flex;gap:8px;">
          <button onclick="confirmDelete()" style="flex:1;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;touch-action:manipulation;">削除する</button>
          <button onclick="cancelDelete()" style="flex:1;padding:11px;background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-weight:600;touch-action:manipulation;">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── ストレージ ──
const STORAGE_KEY = 'pokeca_price_tracker_v1';
let state = { box: [], pack: [] }; // { name, prices: [{date, value}] }

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── 現在タブ ──
let currentTab = 'box';
let currentSortOrder = 'new'; // 'new' | 'old'

function toggleSort() {
  currentSortOrder = currentSortOrder === 'new' ? 'old' : 'new';
  renderMain();
}

function getSortedItems() {
  const items = state[currentTab].slice();
  items.sort(function(a, b) {
    const da = a.releaseDate || '0000-00-00';
    const db = b.releaseDate || '0000-00-00';
    if (da === db) return 0;
    return currentSortOrder === 'new' ? db.localeCompare(da) : da.localeCompare(db);
  });
  return items;
}

// ── ユーティリティ ──
function fmt(n) {
  if (n == null || n === '') return '–';
  return Number(n).toLocaleString('ja-JP') + '円';
}
function today() {
  const d = new Date(); return d.toISOString().slice(0,10);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 最新・最高・前回比 ──
function getStats(item) {
  const prices = [...item.prices].sort((a,b) => a.date.localeCompare(b.date));
  if (!prices.length) return { latest: null, high: null, low: null, diff: null, diffSign: 0 };
  const latest = prices[prices.length-1].value;
  const high = Math.max(...prices.map(p=>p.value));
  const low = Math.min(...prices.map(p=>p.value));
  const prev = prices.length >= 2 ? prices[prices.length-2].value : null;
  const diff = prev != null ? latest - prev : null;
  return { latest, high, low, diff, diffSign: diff == null ? 0 : (diff > 0 ? 1 : diff < 0 ? -1 : 0) };
}

// ── メイン描画 ──
function renderMain() {
  const items = getSortedItems();
  const el = document.getElementById('mainContent');
  if (!items.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${currentTab==='box'?'📦':'🎴'}</div>
      <div class="empty-text">${currentTab==='box'?'BOX':'パック'}がありません</div>
      <div class="empty-sub">右下の＋ボタンで追加してください</div>
    </div>`;
    return;
  }

  const sortLabel = currentSortOrder === 'new' ? '新しい順' : '古い順';
  let html = `<div class="section-header">
    <span class="section-title">一覧</span>
    <button onclick="toggleSort()" style="font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;touch-action:manipulation;">📅 ${sortLabel}</button>
  </div>
  <div class="card-list">`;
  items.forEach((item, idx) => {
    const st = getStats(item);
    let diffHtml = '';
    if (st.diff != null) {
      const cls = st.diffSign > 0 ? 'diff-up' : st.diffSign < 0 ? 'diff-down' : 'diff-flat';
      const arrow = st.diffSign > 0 ? '▲' : st.diffSign < 0 ? '▼' : '─';
      diffHtml = `<div class="price-diff ${cls}">${arrow} ${Math.abs(st.diff).toLocaleString()}円</div>`;
    } else if (st.latest != null) {
      diffHtml = `<div class="price-diff diff-flat">初回記録</div>`;
    }
    const icon = currentTab === 'box' ? '📦' : '🎴';
    const latestStr = st.latest != null ? st.latest.toLocaleString()+'円' : '未記録';
    const highStr = st.high != null ? '最高 '+st.high.toLocaleString()+'円' : '';
    const subStr = highStr || '記録なし';
    html += `<div class="card-row" data-id="${escHtml(item.id || item.name)}">
      <div class="card-row-icon">${icon}</div>
      <div class="card-row-body">
        <div class="card-row-name">${escHtml(item.name)}</div>
        <div class="card-row-sub">${subStr}</div>
      </div>
      <div class="card-row-right">
        <div class="price-main">${latestStr}</div>
        ${diffHtml}
      </div>
      <span class="chevron">›</span>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;

  el.querySelectorAll('.card-row').forEach(row => {
    row.addEventListener('click', () => openDetailById(row.dataset.id));
  });
}

function renderDetail(item, idx) {
  const st = getStats(item);
  const prices = [...item.prices].sort((a,b) => a.date.localeCompare(b.date));
  const body = document.getElementById('detailBody');

  let diffBadge = '';

    const cls = st.diffSign > 0 ? 'diff-up' : st.diffSign < 0 ? 'diff-down' : 'diff-flat';
    const arrow = st.diffSign > 0 ? '▲' : st.diffSign < 0 ? '▼' : '─';
    diffBadge = `<span class="price-diff ${cls}" style="font-size:13px">${arrow} ${Math.abs(st.diff).toLocaleString()}円（前回比）</span>`;
  }

  // 発売日・経過日数

      <span style="font-size:13px;background:var(--surface2);padding:5px 10px;border-radius:20px;color:var(--text2);">${elapsedStr}</span>
    </div>`;
  }

  body.innerHTML = `
    ${releaseBadge}
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">最新</div>
        <div class="stat-value" style="color:var(--accent)">${st.latest!=null?st.latest.toLocaleString():'-'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最高</div>
        <div class="stat-value" style="color:var(--green)">${st.high!=null?st.high.toLocaleString():'-'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最安</div>
        <div class="stat-value" style="color:var(--red)">${st.low!=null?st.low.toLocaleString():'-'}</div>
      </div>
    </div>
    ${diffBadge ? `<div style="margin-bottom:12px;text-align:center">${diffBadge}</div>` : ''}
    <div class="chart-wrap">
      <canvas id="detailChart"></canvas>
    </div>
    <div class="section-header" style="padding-top:0">
      <span class="section-title">履歴</span>
    </div>
    <div class="history-list" id="historyList">
      ${prices.length ? prices.slice().reverse().map(p =>
        `<div class="history-row">
          <span class="history-date">${p.date}</span>
          <span class="history-price">${p.value.toLocaleString()}円</span>
          <button class="history-del" data-date="${p.date}" data-idx="${idx}" style="touch-action:manipulation">🗑</button>
        </div>`
      ).join('') : '<div style="padding:20px;text-align:center;color:var(--text2)">履歴がありません</div>'}
    </div>
  `;

  // グラフ
  if (detailChart) { detailChart.destroy(); detailChart = null; }

    const ctx = document.getElementById('detailChart').getContext('2d');
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    detailChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: prices.map(p => p.date.slice(5)), // MM-DD

// ── 軽量タッチドラッグソート（Safari完全対応・外部依存なし） ──
function initTouchSort(list) {
  var drag = null;
  var placeholder = null;
  var longPressTimer = null;
  var LONG_PRESS = 180;

  function getRows() { return Array.prototype.slice.call(list.querySelectorAll('.manage-row')); }

  function startDrag(row, clientY) {
    drag = row;
    row.classList.add('sortable-chosen');
    placeholder = document.createElement('div');
    placeholder.style.cssText = 'height:' + row.offsetHeight + 'px;background:var(--accent);opacity:.2;border-radius:6px;margin:1px 0;transition:none;';
    row.parentNode.insertBefore(placeholder, row.nextSibling);
    var rect = list.getBoundingClientRect();
    row.style.position = 'fixed';
    row.style.width = list.offsetWidth + 'px';
    row.style.left = rect.left + 'px';
    row.style.top = (clientY - row.offsetHeight / 2) + 'px';
    row.style.zIndex = '999';
    row.style.boxShadow = '0 8px 24px rgba(0,0,0,.25)';
    row.style.borderRadius = '8px';
  }

  function moveDrag(clientY) {
    if (!drag || !placeholder) return;
    drag.style.top = (clientY - drag.offsetHeight / 2) + 'px';
    var rows = getRows();
    var inserted = false;
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      if (row === drag) continue;
      var rect = row.getBoundingClientRect();
      if (clientY < rect.top + rect.height / 2) {
        list.insertBefore(placeholder, row);
        inserted = true;
        break;
      }
    }
    if (!inserted) list.appendChild(placeholder);
  }

  function endDrag() {
    if (!drag) return;
    if (placeholder && placeholder.parentNode) {
      list.insertBefore(drag, placeholder);
      placeholder.parentNode.removeChild(placeholder);
    }
    placeholder = null;
    drag.style.cssText = '';
    drag.classList.remove('sortable-chosen');
    var idOrder = getRows().map(function(r){ return r.dataset.id; });
    var idToItem = {};
    state[currentTab].forEach(function(item){ idToItem[item.id || item.name] = item; });
    state[currentTab] = idOrder.map(function(id){ return idToItem[id]; }).filter(Boolean);
    save(); renderMain();
    drag = null;
  }

  function cancel() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    if (!drag) return;
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
    placeholder = null;
    drag.style.cssText = '';
    drag.classList.remove('sortable-chosen');
    drag = null;
  }

  var handles = list.querySelectorAll('.manage-handle');
  for (var h = 0; h < handles.length; h++) {
    (function(handle) {
      var savedTouch = null;
      handle.addEventListener('touchstart', function(e) {
        savedTouch = e.touches[0];
        var row = handle.closest('.manage-row');
        var clientY = savedTouch.clientY;
        longPressTimer = setTimeout(function() {
          longPressTimer = null;
          startDrag(row, clientY);
        }, LONG_PRESS);
      }, { passive: true });

      handle.addEventListener('touchmove', function(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; return; }
        if (!drag) return;
        e.preventDefault();
        moveDrag(e.touches[0].clientY);
      }, { passive: false });

      handle.addEventListener('touchend', function(e) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; return; }
        endDrag();
      }, { passive: true });

      handle.addEventListener('touchcancel', function() { cancel(); }, { passive: true });
    })(handles[h]);
  }
}

function confirmDelete() {

// ── バックアップ ──
function exportData() {
  try {
    const json = JSON.stringify(state, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const stamp = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
    a.href = url;
    a.download = 'pokeca-backup-' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('エクスポートしました ✓');
  } catch(e) {
    console.error('[export]', e);
    showToast('エクスポートに失敗しました');
  }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.box || !data.pack) throw new Error('形式が正しくありません');
      // UUIDを付与してからマージ
      data.box.forEach(ensureId);
      data.pack.forEach(ensureId);
      state = data;
      save();
      renderMain();
      closeModal('modalManage');
      showToast('インポートしました ✓');
    } catch(err) {
      console.error('[import]', err);
      showToast('読み込みに失敗しました：' + err.message);
    }
    // inputをリセット（同じファイルを再度選べるように）
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── XSSエスケープ ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初期データを常にベースにマージ（削除されたアイテムも復元、ユーザー追加分は保持）
function ensureId(item) {
  if (!item.id) item.id = 'item_' + Math.random().toString(36).slice(2, 9) + '_' + item.name.slice(0,4);
  if (!item.meta) item.meta = {};           // 将来拡張フィールド（後方互換）
  if (!item.releaseDate) item.releaseDate = null;
  if (!item.prices) item.prices = [];
  return item;
}

function mergeWithInitial(saved, initial) {
  const result = JSON.parse(JSON.stringify(initial));
  result.forEach(ensureId);
  const initialNames = new Set(initial.map(x => x.name));
  saved.forEach(item => {
    ensureId(item);
    if (!initialNames.has(item.name)) result.push(item);
  });
  const savedMap = {};
  saved.forEach(item => { savedMap[item.name] = item; });
  result.forEach(item => {
    if (savedMap[item.name]) {
      const savedDates = new Set(item.prices.map(p => p.date));
      savedMap[item.name].prices.forEach(p => {
        if (!savedDates.has(p.date)) item.prices.push(p);
      });
      item.prices.sort((a,b) => a.date.localeCompare(b.date));
    }
  });
  return result;
}

function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const saved = JSON.parse(s);
      state.box = mergeWithInitial(saved.box || [], INITIAL_DATA.box);
      state.pack = mergeWithInitial(saved.pack || [], INITIAL_DATA.pack);
      save();
      return;
    }
  } catch(e) {}
  state = JSON.parse(JSON.stringify(INITIAL_DATA));
  save();
}
load();
renderMain();
